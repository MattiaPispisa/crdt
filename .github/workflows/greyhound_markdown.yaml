name: Build Greyhound Markdown client

on:
  # Reusable only: called by pages.yaml, the single deploy entry point.
  # A GitHub Pages deployment replaces the whole site, so this workflow
  # never deploys on its own — it only builds the client and hands the
  # output to the caller as an artifact.
  workflow_call:
    inputs:
      server_ws_url:
        description: >-
          WebSocket URL of the deployed signaling server (wss://...).
          Leave empty to build with the localhost default.
        required: false
        type: string
        default: ""
      artifact_name:
        description: Name of the uploaded build artifact.
        required: false
        type: string
        default: greyhound-markdown-client

jobs:
  build_client:
    runs-on: ubuntu-latest
    steps:
      - name: 🐕 Checkout
        uses: actions/checkout@v7

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # The app declares hosted versions of the crdt packages; the committed
      # melos-managed pubspec_overrides.yaml points them at the sibling
      # packages, so a plain build resolves everything without bootstrapping.
      # base-href must match where the app is served:
      # <baseUrl>/greyhound_markdown/.
      - name: 🛠️ Build web client
        working-directory: apps/greyhound_markdown/client
        run: |
          DEFINES=()
          if [ -n "${{ inputs.server_ws_url }}" ]; then
            DEFINES+=(--dart-define=GREYHOUND_WS=${{ inputs.server_ws_url }})
          fi
          flutter build web --release \
            --base-href "/crdt/greyhound_markdown/" \
            "${DEFINES[@]}"

      - name: ⬆️ Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: apps/greyhound_markdown/client/build/web
          if-no-files-found: error
