name: Deploy CRDT Docs & Example to GitHub Pages

on:
  # Manual-only: trigger from the Actions tab ("Run workflow").
  workflow_dispatch:
    inputs:
      greyhound_server_ws_url:
        description: >-
          WebSocket URL of the Greyhound Markdown signaling server
          (wss://...). Leave empty to build with the localhost default.
        required: false
        type: string
        default: ""

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run
# in-progress and latest queued. Do not cancel in-progress runs as we want to
# let production deployments finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Builds the Greyhound Markdown client (apps/greyhound_markdown) and
  # shares it as an artifact; assembled into the site by the build job.
  greyhound:
    uses: ./.github/workflows/greyhound_markdown.yaml
    with:
      server_ws_url: ${{ inputs.greyhound_server_ws_url }}

  build:
    needs: greyhound
    runs-on: ubuntu-latest
    steps:
      - name: 📚 Checkout
        uses: actions/checkout@v7

      # --- Toolchain ---
      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # melos.yaml pins `sdkPath: .fvm/flutter_sdk` for local FVM use, which
      # does not exist on CI. Point melos at the runner's Flutter SDK instead.
      - name: 🧭 Resolve Flutter SDK path for melos
        run: echo "MELOS_SDK_PATH=$(dirname "$(dirname "$(which flutter)")")" >> "$GITHUB_ENV"

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: docs/package-lock.json

      # --- Workspace bootstrap (Dart/Flutter deps for every package) ---
      # The root pubspec pins melos as a dev_dependency, so `dart run melos`
      # uses that exact version instead of a globally activated one.
      - name: 📦 Bootstrap workspace
        run: |
          dart pub get
          dart run melos bootstrap

      # --- Build the Flutter web examples ---
      # base-href must match where the app is served: <baseUrl>/examples/.
      - name: 🛠️ Build Flutter web examples
        working-directory: packages/crdt_lf/flutter_example
        run: flutter build web --release --base-href "/crdt/examples/"

      # --- Build the Docusaurus docs ---
      # docs_bs copies the shared assets into docs/static and installs node
      # deps. --ci uses `npm ci` for a clean, lockfile-based install.
      - name: 🧰 Bootstrap docs
        run: dart run scripts/docs_bs.dart --ci

      - name: 📖 Build docs
        run: dart run melos run docs_build

      # --- Assemble the static site ---
      # A Pages deployment replaces the entire site, so every deploy must
      # include all of its parts: docs, examples and the Greyhound app.
      - name: ⬇️ Download Greyhound Markdown client
        uses: actions/download-artifact@v4
        with:
          name: greyhound-markdown-client
          path: _greyhound

      - name: 🧩 Assemble site
        run: |
          mkdir -p _site
          # Docusaurus output at the site root.
          cp -R docs/build/. _site/
          # Flutter example under /examples.
          mkdir -p _site/examples
          cp -R packages/crdt_lf/flutter_example/build/web/. _site/examples/
          # Greyhound Markdown client under /greyhound_markdown.
          mkdir -p _site/greyhound_markdown
          cp -R _greyhound/. _site/greyhound_markdown/

      - name: ⬆️ Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
