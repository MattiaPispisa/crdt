# Codecov configuration
# https://docs.codecov.com/docs/codecov-yaml
coverage:
  status:
    # Non-blocking: the authoritative gate is `very_good_coverage`
    # (min_coverage) inside the reusable package workflows. 
    
    # Codecov still posts the comparison, but its checks never fail the PR.
    project:
      default:
        informational: true
    patch:
      default:
        informational: true

flags:
  hlc_dart:
    paths: [packages/hlc]
    carryforward: true
  crdt_lf:
    paths: [packages/crdt_lf]
    carryforward: true
  crdt_socket_sync:
    paths: [packages/crdt_socket_sync]
    carryforward: true
  crdt_lf_flutter:
    paths: [packages/crdt_lf_flutter]
    carryforward: true
  crdt_lf_hive:
    paths: [packages/crdt_lf_hive]
    carryforward: true
  crdt_lf_drift:
    paths: [packages/crdt_lf_drift]
    carryforward: true
  crdt_lf_sqlite:
    paths: [packages/crdt_lf_sqlite]
    carryforward: true

ignore:
  - "**/*.g.dart"
