name: crdt_lf_flutter_demo
description: "Example app for crdt_lf_flutter: reactive CRDT widgets, selectors and a collaborative text field, with no third-party dependencies."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  crdt_lf:
    path: ../../crdt_lf
  crdt_lf_flutter:
    path: ../
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
